<div class="w-full h-dvh flex items-center justify-center">
  <form (submit)="submit($event)">
    <div class="flex flex-col gap-6 border-black border-2 rounded-4xl p-10 text-xl">
      <div class="flex flex-col gap-2">
        <label for="descricao">Descricao</label>
        <input
          name="descricao"
          type="text"
          class="border-black border-2 rounded-lg bg-gray-200"
          (input)="setDescricao($event)"
          [value]="descricao"
        />
      </div>

      <div class="flex flex-col gap-2">
        <label for="saldo">Saldo</label>
        <input
          name="saldo"
          type="number"
          class="border-black border-2 rounded-lg bg-gray-200"
          min="0"
          (input)="setSaldo($event)"
          [value]="saldo"
        />
      </div>

      <button type="submit" [class.carregando]="carregando" [disabled]="carregando">Criar</button>
    </div>
  </form>
</div>
